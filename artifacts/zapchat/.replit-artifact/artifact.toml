kind = "web"
previewPath = "/"
title = "ZapChat"
version = "1.0.0"
id = "artifacts/zapchat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23443

[services.development]
run = "pnpm --filter @workspace/zapchat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zapchat", "run", "build" ]
publicDir = "artifacts/zapchat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23443"
BASE_PATH = "/"
